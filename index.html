<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AerisWeather — 3D Weather Globe</title>
  <meta name="description" content="Real-time 3D weather visualization globe with volumetric clouds, wind particles, and atmospheric data." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020408;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    #app {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* MapLibre canvas fills the container */
    #app canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #ui-overlay > * { pointer-events: auto; }

    /* Loading state before map initializes */
    .init-loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #020408;
      color: #4a6080;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    .init-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .init-loading .globe-icon {
      font-size: 48px;
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    .init-loading .loading-text {
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="init-loading" id="init-loading">
    <div class="globe-icon">🌐</div>
    <div class="loading-text">Initializing Globe...</div>
  </div>

  <div id="app"></div>
  <div id="ui-overlay"></div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    // Hide loading screen when map is ready
    window.addEventListener('load', () => {
      setTimeout(() => {
        const el = document.getElementById('init-loading');
        if (el) {
          el.classList.add('hidden');
          setTimeout(() => el.remove(), 500);
        }
      }, 2000);
    });
  </script>
</body>
</html>
